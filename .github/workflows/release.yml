name: Release

on:
  release:
    types:
      - published

env:
  DOCKER_IMAGE: toshy/ffconv

jobs:
  release:
    name: Build docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ghcr.io/${{ env.DOCKER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build base image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          load: true
          target: prod
          tags: ${{ env.DOCKER_IMAGE }}:prod

      - name: Test base image
        run: |
          docker run --rm ${{ env.DOCKER_IMAGE }}:prod --help

      - name: Verify fontconfig is present (libass font matching)
        run: |
          docker run --rm --entrypoint /bin/bash ${{ env.DOCKER_IMAGE }}:prod -euo pipefail -c '
            echo "Checking fontconfig runtime prerequisites..."
            test -f /etc/fonts/fonts.conf || { echo "::error::/etc/fonts/fonts.conf missing (fontconfig-config not installed)"; exit 1; }
            test -f /etc/fonts/conf.d/50-ffconv.conf || { echo "::error::/etc/fonts/conf.d/50-ffconv.conf drop-in missing"; exit 1; }
            command -v fc-cache >/dev/null || { echo "::error::fc-cache not found (fontconfig package not installed)"; exit 1; }
            command -v fc-list >/dev/null || { echo "::error::fc-list not found (fontconfig package not installed)"; exit 1; }
            fc-cache -f
            fc-list | head
            echo "fontconfig OK"
          '

      - name: Build and push production image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          target: prod
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
